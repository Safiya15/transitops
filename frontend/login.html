<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TransitOps — Sign in</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="login-brand"><span class="dot" style="width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);"></span> TransitOps</div>
      <div class="login-sub">Smart Transport Operations Platform</div>

      <form id="login-form">
        <div class="form-field">
          <label>Email</label>
          <input type="email" id="email" placeholder="fleet@transitops.demo" required>
        </div>
        <div class="form-field">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button class="btn btn-accent" type="submit">Sign in</button>
      </form>

      <div id="alert-box"></div>

      <div class="link-row">No account? <a href="register.html">Register</a></div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert('alert-box');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      try {
        const data = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
        setSession(data.token, data.user);
        window.location.href = 'dashboard.html';
      } catch (err) {
        showAlert('alert-box', err.message);
      }
    });
  </script>
</body>
</html>
